syntax = "proto3";

package transform.example;

import "example/transform/common.proto";

option go_package = "github.com/wxdqing/go-transformgen/example/transform;examplepb";

message SendChatRequest {
  uint64 channel_id = 1;
  string content = 2;
}

message SendChatResponse {
  EMsgErrorType ret = 1;
  uint64 message_id = 2;
}

message ChatMessageNotify {
  uint64 channel_id = 1;
  uint64 message_id = 2;
  string content = 3;
  repeated string mentions = 4;
  map<string, int32> mention_counts = 5;
  oneof attachment {
    string text_attachment = 6;
    MsgDataTag tag_attachment = 7;
  }
}
