syntax = "proto3";

package transform.example;

import "example/transform/common.proto";

option go_package = "github.com/wxdqing/go-transformgen/example/transform;examplepb";

message StartBattleRequest {
  uint64 player_id = 1;
  string stage_id = 2;
  repeated MsgDataTag tags = 3;
  map<int32, MsgDataTag> tag_by_slot = 4;
}

message StartBattleResponse {
  EMsgErrorType ret = 1;
  uint64 battle_id = 2;
  bool accepted = 3;
}

message BattleStateNotify {
  uint64 battle_id = 1;
  string state = 2;
}
