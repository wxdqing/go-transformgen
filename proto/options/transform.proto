syntax = "proto3";

package transformgen.options;

// This file is intentionally empty of message/file options.
// Message ids are assigned by transformgen's deterministic hash
// (see internal/msgid). Message kind/direction is determined by
// YAML role (request/response/notify) and message naming conventions.
//
// Kept as a reserved package path for any future shared options.

option go_package = "github.com/wxdqing/go-transformgen/proto/options;options";
